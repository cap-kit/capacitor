name: Publish Native iOS Library

on:
  workflow_dispatch:

jobs:
  publish-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # --------------------------------------------------------------------
      # Toolchain
      # --------------------------------------------------------------------
      - name: Select Xcode 26
        run: sudo xcode-select --switch /Applications/Xcode_26.0.app

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: 'spm-xcframework-fix'

      - name: Inspect repository layout
        run: |
          echo "PWD:"
          pwd
          echo
          echo "GITHUB_WORKSPACE:"
          echo "$GITHUB_WORKSPACE"
          echo
          echo "Root listing:"
          ls -la
          echo
          echo "ios directory:"
          ls -la ios || echo "ios directory not found"
          echo
          echo "Find Capacitor.xcodeproj:"
          find . -name Capacitor.xcodeproj || true

      - name: Warm up simulators
        run: xcrun simctl list > /dev/null

      - name: Ensure iOS platform
        run: xcodebuild -downloadPlatform iOS

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      # --------------------------------------------------------------------
      # Build XCFrameworks (ABI stable, SPM-safe)
      # --------------------------------------------------------------------
      - name: Build iOS XCFrameworks (Release, ABI stable)
        run: |
          set -euo pipefail

          ROOT_DIR="$GITHUB_WORKSPACE"
          CAPACITOR_REPO="$GITHUB_WORKSPACE"
          DERIVED_DATA="$ROOT_DIR/DerivedData"
          OUT_DIR="$ROOT_DIR/xcframeworks"

          rm -rf "$DERIVED_DATA" "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          echo "Using DerivedData: $DERIVED_DATA"
          echo "Output dir: $OUT_DIR"

          # ------------------------------------------------------------
          # BUILD: Capacitor
          # ------------------------------------------------------------
          echo "Building Capacitor (iphoneos)..."
          xcodebuild \
            -project "$CAPACITOR_REPO/ios/Capacitor/Capacitor.xcodeproj" \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          echo "Building Capacitor (iphonesimulator)..."
          xcodebuild \
            -project "$CAPACITOR_REPO/ios/Capacitor/Capacitor.xcodeproj" \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphonesimulator \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          # ------------------------------------------------------------
          # BUILD: CapacitorCordova
          # ------------------------------------------------------------
          echo "Building CapacitorCordova (iphoneos)..."
          xcodebuild \
            -project "$CAPACITOR_REPO/ios/CapacitorCordova/CapacitorCordova.xcodeproj" \
            -scheme Cordova \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          echo "Building CapacitorCordova (iphonesimulator)..."
          xcodebuild \
            -project "$CAPACITOR_REPO/ios/CapacitorCordova/CapacitorCordova.xcodeproj" \
            -scheme Cordova \
            -configuration Release \
            -sdk iphonesimulator \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          # ------------------------------------------------------------
          # CREATE XCFRAMEWORKS
          # ------------------------------------------------------------
          CAP_IOS="$DERIVED_DATA/Build/Products/Release-iphoneos/Capacitor.framework"
          CAP_SIM="$DERIVED_DATA/Build/Products/Release-iphonesimulator/Capacitor.framework"

          CORD_IOS="$DERIVED_DATA/Build/Products/Release-iphoneos/Cordova.framework"
          CORD_SIM="$DERIVED_DATA/Build/Products/Release-iphonesimulator/Cordova.framework"

          echo "Creating Capacitor.xcframework..."
          xcodebuild -create-xcframework \
            -framework "$CAP_IOS" \
            -framework "$CAP_SIM" \
            -output "$OUT_DIR/Capacitor.xcframework"

          echo "Creating Cordova.xcframework..."
          xcodebuild -create-xcframework \
            -framework "$CORD_IOS" \
            -framework "$CORD_SIM" \
            -output "$OUT_DIR/Cordova.xcframework"

      # --------------------------------------------------------------------
      # Upload artifacts for SPM
      # --------------------------------------------------------------------
      - name: Upload XCFrameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframeworks
          path: |
            ios/Capacitor.xcframework
            ios/Cordova.xcframework
