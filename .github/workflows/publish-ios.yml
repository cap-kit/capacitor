name: Publish Native iOS Library

on:
  push:
    tags:
      - 'ios-*'

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag name (e.g. ios-8.0.2-spm-fix2)'
        required: true
        type: string

jobs:
  publish-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # --------------------------------------------------------------------
      # Toolchain
      # --------------------------------------------------------------------
      - name: Select Xcode 26
        run: sudo xcode-select --switch /Applications/Xcode_26.0.app

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: 'spm-xcframework-fix'

      - name: Inspect repository layout
        run: |
          echo "PWD:"
          pwd
          echo
          echo "GITHUB_WORKSPACE:"
          echo "$GITHUB_WORKSPACE"
          echo
          echo "Root listing:"
          ls -la
          echo
          echo "ios directory:"
          ls -la ios || echo "ios directory not found"
          echo
          echo "Find Capacitor.xcodeproj:"
          find . -name Capacitor.xcodeproj || true

      - name: Warm up simulators
        run: xcrun simctl list > /dev/null

      - name: Ensure iOS platform
        run: xcodebuild -downloadPlatform iOS

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      # --------------------------------------------------------------------
      # Resolve release tag
      # --------------------------------------------------------------------
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

          echo "Using release tag: $(cat $GITHUB_OUTPUT)"

      # --------------------------------------------------------------------
      # Build XCFrameworks (ABI stable, SPM-safe)
      # --------------------------------------------------------------------
      - name: Build iOS XCFrameworks (Release, ABI stable)
        run: |
          set -euo pipefail

          ROOT_DIR="$GITHUB_WORKSPACE"
          DERIVED_DATA="$ROOT_DIR/DerivedData"
          OUT_DIR="$ROOT_DIR/xcframeworks"

          rm -rf "$DERIVED_DATA" "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          # Capacitor
          xcodebuild \
            -project ios/Capacitor/Capacitor.xcodeproj \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          xcodebuild \
            -project ios/Capacitor/Capacitor.xcodeproj \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphonesimulator \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          # Cordova
          xcodebuild \
            -project ios/CapacitorCordova/CapacitorCordova.xcodeproj \
            -scheme Cordova \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          xcodebuild \
            -project ios/CapacitorCordova/CapacitorCordova.xcodeproj \
            -scheme Cordova \
            -configuration Release \
            -sdk iphonesimulator \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$DERIVED_DATA" \
            build

          # Create XCFrameworks
          xcodebuild -create-xcframework \
            -framework "$DERIVED_DATA/Build/Products/Release-iphoneos/Capacitor.framework" \
            -framework "$DERIVED_DATA/Build/Products/Release-iphonesimulator/Capacitor.framework" \
            -output "$OUT_DIR/Capacitor.xcframework"

          xcodebuild -create-xcframework \
            -framework "$DERIVED_DATA/Build/Products/Release-iphoneos/Cordova.framework" \
            -framework "$DERIVED_DATA/Build/Products/Release-iphonesimulator/Cordova.framework" \
            -output "$OUT_DIR/Cordova.xcframework"

      # --------------------------------------------------------------------
      # Zip XCFrameworks
      # --------------------------------------------------------------------
      - name: Zip XCFrameworks
        run: |
          mkdir -p release
          cd xcframeworks
          zip -r ../release/Capacitor.xcframework.zip Capacitor.xcframework
          zip -r ../release/Cordova.xcframework.zip Cordova.xcframework
          cd ..

      # --------------------------------------------------------------------
      # Compute SwiftPM checksums
      # --------------------------------------------------------------------
      - name: Compute SwiftPM checksums
        id: checksums
        run: |
          CAP=$(swift package compute-checksum release/Capacitor.xcframework.zip)
          CORD=$(swift package compute-checksum release/Cordova.xcframework.zip)

          echo "capacitor=$CAP" >> "$GITHUB_OUTPUT"
          echo "cordova=$CORD" >> "$GITHUB_OUTPUT"

          cat > release/checksums.json <<EOF
          {
            "tag": "${{ steps.tag.outputs.tag }}",
            "capacitor": "$CAP",
            "cordova": "$CORD"
          }
          EOF

      # --------------------------------------------------------------------
      # Create GitHub Release
      # --------------------------------------------------------------------
      - name: Create GitHub Release and upload XCFrameworks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          gh release create "$TAG" \
            release/Capacitor.xcframework.zip \
            release/Cordova.xcframework.zip \
            release/checksums.json \
            --title "iOS XCFrameworks $TAG" \
            --notes "$(cat <<'EOF'
          ### SwiftPM Binary Checksums

          **Capacitor**
          ```
          ${{ steps.checksums.outputs.capacitor }}
          ```

          **Cordova**
          ```
          ${{ steps.checksums.outputs.cordova }}
          ```

          Built with `BUILD_LIBRARY_FOR_DISTRIBUTION=YES`
          Temporary SwiftPM workaround
          EOF
          )" \
            --prerelease
