name: Publish Native iOS Library

on:
  workflow_dispatch:

jobs:
  publish-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # --------------------------------------------------------------------
      # Toolchain
      # --------------------------------------------------------------------
      - name: Select Xcode 26
        run: sudo xcode-select --switch /Applications/Xcode_26.0.app

      - name: Warm up simulators
        run: xcrun simctl list > /dev/null

      - name: Ensure iOS platform
        run: xcodebuild -downloadPlatform iOS

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: 'main'

      # --------------------------------------------------------------------
      # Build XCFrameworks (ABI stable, SPM-safe)
      # --------------------------------------------------------------------
      - name: Build iOS XCFrameworks (Release, ABI stable)
        run: |
          set -e

          DERIVED_DATA=$(mktemp -d)
          OUTPUT_DIR=$PWD/ios
          mkdir -p "$OUTPUT_DIR"

          xcodebuild \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA/device" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO

          xcodebuild \
            -scheme Capacitor \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA/simulator" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO

          xcodebuild -create-xcframework \
            -framework "$DERIVED_DATA/device/Build/Products/Release-iphoneos/Capacitor.framework" \
            -framework "$DERIVED_DATA/simulator/Build/Products/Release-iphonesimulator/Capacitor.framework" \
            -output "$OUTPUT_DIR/Capacitor.xcframework"

          xcodebuild -create-xcframework \
            -framework "$DERIVED_DATA/device/Build/Products/Release-iphoneos/Cordova.framework" \
            -framework "$DERIVED_DATA/simulator/Build/Products/Release-iphonesimulator/Cordova.framework" \
            -output "$OUTPUT_DIR/Cordova.xcframework"

      # --------------------------------------------------------------------
      # Upload artifacts for SPM
      # --------------------------------------------------------------------
      - name: Upload XCFrameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframeworks
          path: |
            ios/Capacitor.xcframework
            ios/Cordova.xcframework
